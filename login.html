
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Admin - Renovah RH</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

/* FUNDO */

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:#2f5aa8;

background-image:
radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 70% 70%, rgba(0,0,0,0.08), transparent 40%);

}

/* ANIMAÇÃO DO FUNDO */

/* CARD */

.login-card{

width:420px;

padding:45px;

border-radius:16px;

background:rgba(255,255,255,0.92);

backdrop-filter:blur(12px);

box-shadow:
0 20px 60px rgba(0,0,0,0.25);

text-align:center;

animation:fadeUp 0.8s ease;

}

/* ANIMAÇÃO */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

width:110px;
margin-bottom:20px;

}

/* TITULO */

h2{

color:#1d3f72;
margin-bottom:25px;
font-weight:600;

}

/* INPUT */

.input-box{

position:relative;
margin-bottom:18px;

}

.input-box input{

width:100%;
padding:14px 55px 14px 42px;

border-radius:8px;
border:1px solid #ddd;

font-size:14px;
transition:0.3s;

background:#f7f9fc;

}

.input-box input:focus{

border-color:#1d3f72;
outline:none;

box-shadow:0 0 0 2px rgba(29,63,114,0.15);

}

/* ICONES */

/* Ícone da esquerda */

.input-box i:first-child{

position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#777;

}

/* Olho da direita */

.show-pass{

position:absolute;

right:14px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

color:#777;

font-size:16px;

}

/* BOTÃO */

.login-btn{

margin-top:10px;

width:100%;
padding:14px;

border:none;

background:linear-gradient(90deg,#1d3f72,#2f6adf);

color:white;

border-radius:8px;

font-weight:600;
letter-spacing:0.5px;

cursor:pointer;

transition:0.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

}

/* ERRO */

.erro{

margin-top:10px;
color:#d00000;
font-size:14px;

}

/* MOSTRAR SENHA */

.show-pass{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

color:#777;

font-size:16px;

}

</style>

</head>

<body>

<div class="login-card">

<img src="logo.jpg" class="logo">

<h2>Painel Administrativo</h2>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email" id="email" placeholder="Email">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input type="password" id="senha" placeholder="Senha">

<i class="fa-solid fa-eye show-pass" onclick="mostrarSenha()"></i>

</div>

<button class="login-btn" onclick="login()">
Entrar
</button>

<p id="erro" class="erro"></p>

</div>

<script src="admin.js"></script>

<script>

function mostrarSenha(){

const senha = document.getElementById("senha")

if(senha.type === "password"){
senha.type = "text"
}else{
senha.type = "password"
}

}

</script>

</body>
</html>

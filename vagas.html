<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vagas de Emprego - Renovah RH</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

/* FUNDO */

body{

min-height:100vh;

background:#2f5aa8;

background-image:
radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
radial-gradient(circle at 70% 70%, rgba(0,0,0,0.08), transparent 40%);

padding:60px 20px;

}

/* TITULO */

h1{

text-align:center;
color:white;
margin-bottom:40px;
font-weight:600;

}

/* GRID */

.vagas-container{

max-width:1100px;
margin:auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;

}

/* CARD */

.vaga{

background:rgba(255,255,255,0.92);

backdrop-filter:blur(12px);

padding:28px;

border-radius:14px;

box-shadow:0 20px 50px rgba(0,0,0,0.25);

transition:0.3s;

}

.vaga:hover{

transform:translateY(-6px);

box-shadow:0 30px 70px rgba(0,0,0,0.35);

}

/* TITULO DA VAGA */

.vaga h3{

color:#1d3f72;
margin-bottom:10px;

}

/* TEXTO */

.vaga p{

font-size:14px;
margin-bottom:6px;
color:#333;

}

/* BOTÃO VOLTAR */

.voltar{

display:block;
width:200px;

margin:40px auto 0;

text-align:center;

background:linear-gradient(90deg,#1d3f72,#2f6adf);

color:white;

padding:14px;

border-radius:8px;

text-decoration:none;

font-weight:600;

transition:0.3s;

}

.voltar:hover{

transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);

}

</style>

</head>

<body>

<h1>Vagas Disponíveis</h1>

<div class="vagas-container" id="lista-vagas"></div>

<a href="index.html" class="voltar">Voltar ao site</a>

<script>

let vagas = JSON.parse(localStorage.getItem("vagas")) || [];

let container = document.getElementById("lista-vagas");

if(vagas.length === 0){

container.innerHTML = "<p style='color:white;text-align:center;'>Nenhuma vaga cadastrada no momento.</p>";

}

vagas.forEach(v=>{

container.innerHTML += `

<div class="vaga">

<h3>${v.titulo}</h3>

<p><strong>Salário:</strong> ${v.salario || ""}</p>

<p><strong>Horário:</strong> ${v.horario || ""}</p>

<p><strong>Benefícios:</strong> ${v.beneficios || ""}</p>

<p><strong>Requisitos:</strong> ${v.requisitos || ""}</p>

<p><strong>Descrição:</strong> ${v.descricao || ""}</p>

</div>

`

})

</script>

</body>
</html>
